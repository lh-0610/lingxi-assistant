<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="theme-color" content="#1a1b26">
<title>灵犀 AI 助手</title>
<style>
  :root{
    --c-bg:    #1a1b26;--c-surface:#24283b;--c-border:#3b4261;
    --c-text:  #c0caf5;--c-sub:#565f89;--c-accent:#7aa2f7;
    --c-green: #9ece6a;--c-orange:#e0af68;--c-red:#f7768e;
    --c-purple:#bb9af7;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bot:env(safe-area-inset-bottom,0px);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;background:var(--c-bg);color:var(--c-text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  #app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top);}

  /* ── 头部 ── */
  header{display:flex;align-items:center;gap:8px;padding:10px 16px;
    background:var(--c-surface);border-bottom:1px solid var(--c-border);min-height:48px;}
  header .logo{font-size:18px;font-weight:700;color:var(--c-accent);letter-spacing:0.5px;}
  header .dot{width:10px;height:10px;border-radius:50%;background:var(--c-green);
    animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  header .spacer{flex:1;}
  #btn-search{background:var(--c-bg);color:var(--c-sub);border:1px solid var(--c-border);
    border-radius:999px;padding:5px 12px;font-size:12px;outline:none;cursor:pointer;white-space:nowrap;}
  #btn-search.on{color:#fff;background:var(--c-accent);border-color:var(--c-accent);}
  #btn-search:disabled{opacity:0.5;cursor:default;}
  #btn-clear{background:none;border:none;color:var(--c-sub);font-size:14px;
    padding:8px 12px;cursor:pointer;min-height:44px;min-width:44px;
    display:flex;align-items:center;justify-content:center;}
  #btn-clear:hover{color:var(--c-accent);}

  /* ── 消息区 ── */
  #messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;
    -webkit-overflow-scrolling:touch;}
  .msg{max-width:88%;padding:10px 14px;border-radius:16px;line-height:1.55;font-size:15px;
    word-wrap:break-word;white-space:pre-wrap;position:relative;}
  .msg.user{align-self:flex-end;background:var(--c-accent);color:#fff;
    border-bottom-right-radius:4px;}
  .msg.ai{align-self:flex-start;background:var(--c-surface);color:var(--c-text);
    border:1px solid var(--c-border);border-bottom-left-radius:4px;}
  .msg.ai p{margin:0.4em 0;}
  .msg.ai pre{background:#1a1b26;padding:8px 10px;border-radius:8px;overflow-x:auto;
    margin:0.5em 0;font-size:13px;}
  .msg.ai code{font-size:13px;font-family:"Fira Code",Consolas,monospace;}
  .msg.ai a{color:var(--c-accent);}
  .msg.error{align-self:center;max-width:95%;background:rgba(247,118,142,0.12);
    border:1px solid var(--c-red);color:var(--c-red);text-align:center;font-size:13px;}
  .msg.system{align-self:center;max-width:90%;background:rgba(187,154,247,0.10);
    border:1px solid var(--c-purple);color:var(--c-purple);text-align:center;font-size:13px;}

  /* ── 思考指示器 ── */
  .thinking{display:flex;gap:6px;align-items:center;padding:8px 14px;
    background:rgba(122,162,247,0.08);border:1px solid var(--c-border);border-radius:16px;
    align-self:flex-start;font-size:13px;color:var(--c-sub);}
  .thinking .dots span{display:inline-block;width:5px;height:5px;border-radius:50%;
    background:var(--c-accent);margin:0 2px;animation:bounce 1.4s infinite both;}
  .thinking .dots span:nth-child(2){animation-delay:0.2s}
  .thinking .dots span:nth-child(3){animation-delay:0.4s}
  @keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}

  /* ── 思考块(可折叠,用原生 details/summary)── */
  .think-box{align-self:flex-start;max-width:88%;background:rgba(187,154,247,0.08);
    border:1px solid rgba(187,154,247,0.3);border-radius:14px;font-size:13px;padding:7px 12px;}
  .think-box summary{color:var(--c-purple);cursor:pointer;user-select:none;list-style:none;outline:none;}
  .think-box summary::-webkit-details-marker{display:none;}
  .think-box summary::before{content:'▸ ';font-size:11px;}
  .think-box[open] summary::before{content:'▾ ';}
  .think-box .tc{margin-top:6px;color:var(--c-sub);white-space:pre-wrap;line-height:1.5;
    max-height:240px;overflow-y:auto;}
  /* ── token 用量 ── */
  .usage{align-self:flex-start;font-size:11px;color:var(--c-sub);padding:0 4px;}
  /* ── 复制按钮 ── */
  .msg.ai .copy-btn{display:inline-block;margin-top:6px;font-size:11px;color:var(--c-sub);
    cursor:pointer;border:1px solid var(--c-border);border-radius:6px;padding:2px 8px;}
  .msg.ai .copy-btn:active{color:var(--c-accent);}

  /* ── 输入区 ── */
  #input-area{display:flex;align-items:center;gap:8px;padding:10px 12px;
    padding-bottom:calc(10px + var(--safe-bot));
    background:var(--c-surface);border-top:1px solid var(--c-border);}
  #msg-input{flex:1;resize:none;border:1px solid var(--c-border);border-radius:14px;
    padding:10px 14px;font-size:15px;color:var(--c-text);background:var(--c-bg);
    max-height:120px;line-height:1.4;outline:none;transition:border-color 0.2s;}
  #msg-input:focus{border-color:var(--c-accent);}
  #msg-input::placeholder{color:var(--c-sub);}
  #btn-send{background:var(--c-accent);color:#fff;border:none;border-radius:50%;
    width:44px;height:44px;min-width:44px;min-height:44px;display:flex;
    align-items:center;justify-content:center;cursor:pointer;
    transition:opacity 0.2s;font-size:18px;flex-shrink:0;}
  #btn-send:disabled{opacity:0.4;cursor:default;}
  #btn-send:hover:not(:disabled){opacity:0.85;}
  #btn-send.is-stop{background:var(--c-red);}
  #btn-send svg{display:block;}   /* 去掉 inline-svg 基线间隙,图标真正居中 */

  /* ── 登录 / 注册 ── */
  #auth-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;
    align-items:center;justify-content:center;z-index:100;padding:16px;}
  #auth-box{background:var(--c-surface);border:1px solid var(--c-border);border-radius:16px;
    padding:24px;width:min(92vw,360px);}
  #auth-box h3{margin-bottom:16px;color:var(--c-accent);font-size:17px;text-align:center;}
  #auth-box input{width:100%;border:1px solid var(--c-border);border-radius:10px;
    padding:11px 14px;font-size:15px;background:var(--c-bg);color:var(--c-text);
    outline:none;margin-bottom:12px;}
  #auth-box input:focus{border-color:var(--c-accent);}
  #auth-box button{width:100%;background:var(--c-accent);color:#fff;border:none;
    border-radius:10px;padding:12px;font-size:15px;font-weight:600;cursor:pointer;}
  #auth-box button:disabled{opacity:0.5;}
  #auth-err{color:var(--c-red);font-size:13px;min-height:18px;margin-bottom:8px;text-align:center;}
  #auth-switch{margin-top:14px;font-size:13px;color:var(--c-sub);cursor:pointer;text-align:center;}
  #auth-switch:hover{color:var(--c-accent);}
  #btn-logout{background:none;border:none;color:var(--c-sub);font-size:13px;
    padding:8px;cursor:pointer;min-height:44px;display:flex;align-items:center;}
  #btn-logout:hover{color:var(--c-red);}

  /* ── Markdown 渲染 ── */
  .msg.ai h1,.msg.ai h2,.msg.ai h3{margin:0.6em 0 0.3em;font-weight:600;}
  .msg.ai ul,.msg.ai ol{margin:0.4em 0;padding-left:1.5em;}
  .msg.ai blockquote{border-left:3px solid var(--c-border);margin:0.5em 0;
    padding:0.2em 0 0.2em 0.8em;color:var(--c-sub);}

  /* ── 滚动条(消息区 + 思考块内容区统一细样式;不然桌面端 .tc 显示粗默认条)── */
  #messages::-webkit-scrollbar,.think-box .tc::-webkit-scrollbar{width:5px;}
  #messages::-webkit-scrollbar-thumb,.think-box .tc::-webkit-scrollbar-thumb{
    background:var(--c-border);border-radius:4px;}
  #messages::-webkit-scrollbar-track,.think-box .tc::-webkit-scrollbar-track{background:transparent;}
  .think-box .tc{scrollbar-width:thin;scrollbar-color:var(--c-border) transparent;}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="dot" id="status-dot"></div>
    <span class="logo">灵犀</span>
    <button id="btn-search" class="on" title="联网检索开关">🔍 联网 开</button>
    <div class="spacer"></div>
    <button id="btn-clear" title="新对话">新对话</button>
    <button id="btn-logout" title="退出登录">退出</button>
  </header>

  <div id="messages">
    <div class="msg system">欢迎使用灵犀 Web 前端 ✨</div>
  </div>

  <div id="input-area">
    <textarea id="msg-input" rows="1" placeholder="输入消息…" autofocus></textarea>
    <button id="btn-send" title="发送">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round"
           stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

  <div id="auth-overlay">
    <div id="auth-box">
      <h3 id="auth-title">登录灵犀</h3>
      <input id="auth-user" type="text" placeholder="用户名" autocomplete="username">
      <input id="auth-pass" type="password" placeholder="密码" autocomplete="current-password">
      <div id="auth-err"></div>
      <button id="auth-submit">登录</button>
      <div id="auth-switch">没有账号?去注册 →</div>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ── 状态 ──
  const history = [];   // [{role, content}]
  // 多用户:token 由登录/注册获得,存 localStorage(每个账号数据隔离)
  let token = localStorage.getItem('lingxi_token') || '';
  let username = '';
  let generating = false;

  // ── DOM ──
  const $msgs     = document.getElementById('messages');
  const $input    = document.getElementById('msg-input');
  const $send     = document.getElementById('btn-send');
  const $clear    = document.getElementById('btn-clear');
  const $dot      = document.getElementById('status-dot');
  const $overlay   = document.getElementById('auth-overlay');
  const $authUser  = document.getElementById('auth-user');
  const $authPass  = document.getElementById('auth-pass');
  const $authErr   = document.getElementById('auth-err');
  const $authSubmit= document.getElementById('auth-submit');
  const $authSwitch= document.getElementById('auth-switch');
  const $logout    = document.getElementById('btn-logout');
  const $search    = document.getElementById('btn-search');

  // ── 鉴权头 ──
  function authHeaders(extra) {
    var h = Object.assign({}, extra || {});
    if (token) { h['X-Auth-Token'] = token; }
    return h;
  }

  // ── 联网检索开关(默认开)──
  var webSearch = true;
  function renderSearchBtn() {
    $search.textContent = webSearch ? '🔍 联网 开' : '🔍 联网 关';
    $search.classList.toggle('on', webSearch);
  }
  $search.addEventListener('click', function() {
    if (generating) return;
    webSearch = !webSearch;
    renderSearchBtn();
  });
  renderSearchBtn();

  // ── 登录 / 注册 ──
  let authMode = 'login';   // login | register
  function startApp() { $overlay.style.display = 'none'; $input.focus(); loadHistory(); }
  function showAuth() { $overlay.style.display = 'flex'; }
  function setMode(m) {
    authMode = m;
    document.getElementById('auth-title').textContent = m === 'login' ? '登录灵犀' : '注册灵犀';
    $authSubmit.textContent = m === 'login' ? '登录' : '注册';
    $authSwitch.textContent = m === 'login' ? '没有账号?去注册 →' : '已有账号?去登录 →';
    $authErr.textContent = '';
  }
  function submitAuth() {
    var u = $authUser.value.trim(), p = $authPass.value;
    if (!u || !p) { $authErr.textContent = '请输入用户名和密码'; return; }
    var url = authMode === 'login' ? '/api/login' : '/api/register';
    $authSubmit.disabled = true; $authErr.textContent = '';
    fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' },
                 body: JSON.stringify({ username: u, password: p }) })
      .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, d: d }; }); })
      .then(function(res) {
        if (res.ok && res.d.token) {
          token = res.d.token; username = res.d.username || u;
          localStorage.setItem('lingxi_token', token);
          $authPass.value = '';
          startApp();
        } else {
          $authErr.textContent = (res.d && res.d.error) || '操作失败';
        }
      })
      .catch(function() { $authErr.textContent = '网络错误'; })
      .finally(function() { $authSubmit.disabled = false; });
  }
  function doLogout() {
    fetch('/api/logout', { method: 'POST', headers: authHeaders() }).catch(function() {}).finally(function() {
      token = ''; username = '';
      localStorage.removeItem('lingxi_token');
      $msgs.innerHTML = '';
      $authUser.value = ''; $authPass.value = '';
      setMode('login'); showAuth();
    });
  }
  function boot() {
    if (!token) { showAuth(); return; }
    fetch('/api/me', { headers: authHeaders() })
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(d) {
        if (d && d.username) { username = d.username; startApp(); }
        else { token = ''; localStorage.removeItem('lingxi_token'); showAuth(); }
      })
      .catch(function() { showAuth(); });
  }
  $authSubmit.onclick = submitAuth;
  $authSwitch.onclick = function() { setMode(authMode === 'login' ? 'register' : 'login'); };
  $authPass.addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); submitAuth(); } });
  $authUser.addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); $authPass.focus(); } });
  if ($logout) $logout.addEventListener('click', doLogout);

  // ── 工具函数 ──
  function esc(s) {
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(s));
    return d.innerHTML;
  }

  function scrollToBottom() {
    requestAnimationFrame(function() {
      $msgs.scrollTop = $msgs.scrollHeight;
    });
  }

  function autoResize() {
    $input.style.height = 'auto';
    $input.style.height = Math.min($input.scrollHeight, 120) + 'px';
  }

  // ── 简易 Markdown → HTML（Web 端轻量实现）──
  function mdToHtml(md) {
    var h = esc(md);
    // 代码块
    h = h.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    // 行内代码
    h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
    // 标题
    h = h.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
    h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    h = h.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    h = h.replace(/^# (.+)$/gm, '<h1>$1</h1>');
    // 粗体 / 斜体
    h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // 链接
    h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    // 无序列表
    h = h.replace(/^- (.+)$/gm, '<li>$1</li>');
    h = h.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
    // 引用
    h = h.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
    // 换行
    h = h.replace(/\n/g, '<br>');
    return h;
  }

  // ── 消息渲染 ──
  function addMsg(cls, html, isMarkdown) {
    var div = document.createElement('div');
    div.className = 'msg ' + cls;
    div.innerHTML = isMarkdown ? mdToHtml(html) : esc(html).replace(/\n/g, '<br>');
    $msgs.appendChild(div);
    scrollToBottom();
    return div;
  }

  function addThinking() {
    var div = document.createElement('div');
    div.className = 'thinking';
    div.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>'
                  + '<span>灵犀思考中…</span>';
    $msgs.appendChild(div);
    scrollToBottom();
    return div;
  }

  // ── 思考块(可折叠,原生 details:summary 永远可见,收起后仍是"💭 思考过程"标签)──
  function makeThinkBox() {
    var box = document.createElement('details');
    box.className = 'think-box';
    box.open = true;                       // 思考时展开
    var s = document.createElement('summary'); s.textContent = '💭 思考过程';
    var tc = document.createElement('div'); tc.className = 'tc';
    box.appendChild(s); box.appendChild(tc);
    $msgs.appendChild(box);
    box._tc = tc;
    return box;
  }

  // ── 复制按钮 ──
  function addCopyBtn(aiEl, text) {
    var b = document.createElement('div');
    b.className = 'copy-btn'; b.textContent = '复制';
    b.onclick = function() {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(function() {
          b.textContent = '已复制'; setTimeout(function() { b.textContent = '复制'; }, 1200);
        }).catch(function() {});
      }
    };
    aiEl.appendChild(b);
  }

  // ── 历史恢复(重开 App 不丢对话:服务器还存着)──
  function renderHistory(msgs) {
    $msgs.innerHTML = '';
    if (!msgs || !msgs.length) {
      $msgs.innerHTML = '<div class="msg system">欢迎使用灵犀 Web 前端 ✨</div>';
      return;
    }
    msgs.forEach(function(m) {
      if (m.role === 'user') { addMsg('user', m.text || ''); }
      else if (m.role === 'assistant') { addCopyBtn(addMsg('ai', m.text || '', true), m.text || ''); }
      // tool 角色:chat_only 下无工具,忽略
    });
    scrollToBottom();
  }
  function loadHistory() {
    fetch('/api/history', { headers: authHeaders() })
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(d) { if (d && d.messages) renderHistory(d.messages); })
      .catch(function() {});
  }
  function doNewChat() {
    if (generating) return;
    fetch('/api/new', { method: 'POST', headers: authHeaders() })
      .then(function() {
        history.length = 0;
        $msgs.innerHTML = '<div class="msg system">新对话已开始 ✨</div>';
        $input.focus();
      }).catch(function() {});
  }

  // ── 停止生成 ──
  function stopGen() {
    fetch('/api/stop', { method: 'POST', headers: authHeaders() }).catch(function() {});
  }
  // 干净的图标字符串(不从 HTML 捕获,避免换行空白影响居中)
  var SEND_ICON = '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"'
                + ' stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'
                + '<line x1="22" y1="2" x2="11" y2="13"></line>'
                + '<polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>';
  var STOP_ICON = '<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">'
                + '<rect x="6" y="6" width="12" height="12" rx="2"></rect></svg>';
  $send.innerHTML = SEND_ICON;   // 用干净版覆盖 HTML 里带空白的那份

  function setStatus(status) {
    $dot.style.background = status === 'ok' ? 'var(--c-green)'
                          : status === 'busy' ? 'var(--c-orange)'
                          : 'var(--c-red)';
  }

  // ── 发送 ──
  function doSend() {
    var text = $input.value.trim();
    if (!text || generating) return;

    addMsg('user', text);
    history.push({role: 'user', content: text});
    $input.value = '';
    autoResize();

    generating = true;
    $send.innerHTML = STOP_ICON;     // 发送→停止(可点)
    $send.classList.add('is-stop');
    $search.disabled = true;
    setStatus('busy');
    var thinkEl = addThinking();
    var aiEl = null;
    var thinkBox = null;
    var usageEl = null;
    var hadContent = false;

    fetch('/api/chat', {
      method: 'POST',
      headers: Object.assign(
        {'Content-Type': 'application/json'},
        token ? {'Authorization': 'Bearer ' + token} : {}
      ),
      body: JSON.stringify({message: text, history: history.slice(0, -1), web_search: webSearch})
    }).then(function(resp) {
      if (!resp.ok) {
        if (resp.status === 401 || resp.status === 403) {
          token = ''; localStorage.removeItem('lingxi_token'); showAuth();
          throw new Error('登录已失效，请重新登录');
        }
        throw new Error('请求失败: ' + resp.status);
      }
      var reader = resp.body.getReader();
      var decoder = new TextDecoder();
      var buf = '';

      function readChunk() {
        return reader.read().then(function(result) {
          if (result.done) return;
          buf += decoder.decode(result.value, {stream: true});
          // NDJSON:一行一个 JSON 对象
          var lines = buf.split('\n');
          buf = lines.pop() || '';
          for (var i = 0; i < lines.length; i++) {
            var line = lines[i].trim();
            if (!line) continue;
            var ev;
            try { ev = JSON.parse(line); } catch(e) { continue; }
            handleEvent(ev);
          }
          return readChunk();
        });
      }
      return readChunk();
    }).catch(function(err) {
      if (thinkEl.parentNode) thinkEl.remove();
      addMsg('error', '⚠ ' + (err.message || '连接失败'));
    }).finally(function() {
      if (thinkEl.parentNode) thinkEl.remove();
      generating = false;
      $send.innerHTML = SEND_ICON;
      $send.classList.remove('is-stop');
      $search.disabled = false;
      setStatus('ok');
    });

    function handleEvent(ev) {
      var type = ev.type;
      if (type === 'ping' || type === 'done' || type === 'plan') return;

      if (type === 'msg') {
        var tag = ev.tag || '';
        var text = ev.text || '';
        if (tag === 'thinking_indicator' || tag === 'remove_thinking') return;
        if (tag === 'think_header') return;   // 仅头部不建框:有真内容(think_msg)才建,避免空框收起成一条线
        if (tag === 'think_msg') {
          if (!text) return;                  // 空思考内容不建框
          if (thinkEl.parentNode) thinkEl.remove();
          if (!thinkBox) thinkBox = makeThinkBox();
          thinkBox._tc.textContent += text;
          scrollToBottom();
          return;
        }
        if (tag === 'think_collapse') { if (thinkBox) thinkBox.open = false; return; }
        // 工具中间态 / 布局占位:M1 不渲染
        if (tag === 'tool_tag' || tag === 'tool_detail' || tag === 'tool_result' || tag === 'ai_image') return;
        if (tag === 'ai_label' || tag === 'spacer' || tag === 'reset_ai_reply' || tag === 'user_label') return;
        // 其余(ai_msg / 未知 tag)当正文流式追加(向前兼容)
        if (thinkEl.parentNode) thinkEl.remove();
        if (!aiEl) { aiEl = addMsg('ai', ''); hadContent = true; }
        aiEl.textContent += text;
        scrollToBottom();
        return;
      }

      if (type === 'usage') {
        if (ev.total && typeof ev.total.total === 'number') {
          if (!usageEl) { usageEl = document.createElement('div'); usageEl.className = 'usage'; $msgs.appendChild(usageEl); }
          usageEl.textContent = '⛁ ' + ev.total.total + ' tokens';
          scrollToBottom();
        }
        return;
      }

      if (type === 'md') {
        if (thinkEl.parentNode) thinkEl.remove();
        if (thinkBox) thinkBox.open = false;
        if (aiEl) { aiEl.innerHTML = mdToHtml(ev.text || ''); }
        else { aiEl = addMsg('ai', ev.text || '', true); }
        addCopyBtn(aiEl, ev.text || '');
        hadContent = true;
        history.push({role: 'assistant', content: ev.text || ''});
        scrollToBottom();
        return;
      }

      if (type === 'retry') {
        addMsg('error', '⚠ ' + (ev.text || '模型请求失败,重试中…'));
        return;
      }

      if (type === 'error') {
        if (thinkEl.parentNode) thinkEl.remove();
        addMsg('error', '⚠ ' + (ev.message || ev.text || '出错了'));
        return;
      }
    }
  }

  // ── 事件绑定 ──
  $send.addEventListener('click', function() {
    if (generating) { stopGen(); } else { doSend(); }   // 生成中点 = 停止
  });

  $input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!generating) doSend();
    }
  });

  $input.addEventListener('input', autoResize);

  $clear.addEventListener('click', doNewChat);   // 新对话:清服务端 + 客户端

  // ── 初始化 ──
  setStatus('ok');
  autoResize();
  boot();   // 有有效 token 直接进 App,否则弹登录/注册
})();
</script>
</body>
</html>
